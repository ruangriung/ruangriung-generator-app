name: Auto Blog Generation

on:
  schedule:
    - cron: '0 5 */3 * *' # Menjalankan setiap 3 hari jam 12:00 SIANG WIB (05:00 UTC)
  workflow_dispatch: # Memungkinkan untuk dijalankan secara manual dari tab Actions di GitHub

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Diperlukan untuk push commit kembali ke repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Blog Generator
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: node scripts/generate-ai-blog.mjs

      - name: Commit and Push new article
        run: |
          git config --global user.name "RuangRiung AI Bot"
          git config --global user.email "bot@ruangriung.my.id"
          git add content/articles-md/
          git commit -m "feat: automated blog post generation" || echo "No changes to commit"
          git push
